      </div>

      <div class="section-title">Теги</div>

    </aside>

          <div class="meta">
            Найдено: <strong id="count">0</strong>

        </div>

      </div>

      <div id="out"></div>
    </section>

      },
      {
        id: "thread-ball",
        title: "Моток ниток",
        section: "Необычные варианты свечек",
        tags: ["#свечка"],
        fullText: `Моток ниток

      },
      {
        id: "creative-candle",
        title: "Творческая свечка",
        section: "Необычные варианты свечек",
        tags: ["#свечка"],
        fullText: `Творческая свечка
Реквизит: нет

Каждый человек рассказывает про свои эмоции и впечатления в формате вымышленной метафорической и сказочной истории/путешествия.`,
      },
      {
        id: "specialty-candle",
        title: "Свечка по специальности",
        section: "Необычные варианты свечек",
        tags: ["#свечка"],
        fullText: `Свечка по специальности
Реквизит: нет

Необходимо описать свои эмоции и опыт с помощью какой-либо тематики в зависимости от программы или увлечений группы («Расскажи про свои эмоции на языке дизайнера/программиста»).`,
      },
      {
        id: "support-circle",
        title: "Круг поддержки",
        section: "Необычные варианты свечек",
        tags: ["#свечка"],
        fullText: `Круг поддержки
Реквизит: нет

Перемешайте участников и предложите им сесть в круг. Каждый из них по очереди говорит что-то позитивное о своем соседе: за что он благодарен этому человеку, что в нем ценит, или за что хотел бы его похвалить.`,
      },
    ];

    // ---------------------------
    // UI STATE
    // ---------------------------
    const state = {
      q: "",
      section: "__ALL__",
      mode: "AND", // AND | OR
      selectedTags: new Set(),
    };

    // ---------------------------
    // DOM refs
    // ---------------------------
    const $q = document.getElementById("q");
    const $sectionSelect = document.getElementById("sectionSelect");
    const $tagChips = document.getElementById("tagChips");
    const $out = document.getElementById("out");
    const $count = document.getElementById("count");
    const $activeFilters = document.getElementById("activeFilters");
    const $modeAnd = document.getElementById("modeAnd");
    const $modeOr = document.getElementById("modeOr");
    const $clearBtn = document.getElementById("clearBtn");

    const $modal = document.getElementById("modal");
    const $closeBtn = document.getElementById("closeBtn");
    const $mTitle = document.getElementById("mTitle");
    const $mSection = document.getElementById("mSection");
    const $mTagsLine = document.getElementById("mTagsLine");
    const $mText = document.getElementById("mText");
    const $mImages = document.getElementById("mImages");

    // ---------------------------
    // Helpers
    // ---------------------------
    function escapeHtml(str){
      return str.replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function normalize(s){
      return (s || "").toLowerCase();
    }

    function excerpt(fullText, n=260){
      const t = (fullText || "").trim();
      if(t.length <= n) return t;
      return t.slice(0, n).trimEnd() + "…";
    }

    function uniq(arr){
      return Array.from(new Set(arr));
    }

    function groupBy(arr, keyFn){
      const m = new Map();
      for(const it of arr){
        const k = keyFn(it);
        if(!m.has(k)) m.set(k, []);
        m.get(k).push(it);
      }
      return m;
    }

    function getAllSections(){
      return uniq(items.map(i => i.section)).sort((a,b)=>a.localeCompare(b,'ru'));
    }

    function getTagCounts(){
      const counts = new Map();
      for(const it of items){
        for(const t of (it.tags || [])){
          counts.set(t, (counts.get(t) || 0) + 1);
        }
      }
      // stable sort: by count desc, then alpha
      return Array.from(counts.entries()).sort((a,b)=>{
        if(b[1] !== a[1]) return b[1] - a[1];
        return a[0].localeCompare(b[0],'ru');
      });
    }

    function matchesQuery(it, q){
      if(!q) return true;
      const qq = normalize(q);
      return normalize(it.title).includes(qq) || normalize(it.fullText).includes(qq);
    }

    function matchesSection(it, section){
      if(section === "__ALL__") return true;
      return it.section === section;
    }

    function matchesTags(it, selectedTags, mode){
      if(!selectedTags || selectedTags.size === 0) return true;
      const tags = new Set(it.tags || []);
      if(mode === "AND"){
        for(const t of selectedTags){
          if(!tags.has(t)) return false;
        }
        return true;
      } else { // OR
        for(const t of selectedTags){
          if(tags.has(t)) return true;
        }
        return false;
      }
    }

    function filteredItems(){
      const q = state.q;
      const section = state.section;
      const mode = state.mode;
      const selectedTags = state.selectedTags;

      const res = [];
      for(const it of items){
        if(!matchesQuery(it, q)) continue;
        if(!matchesSection(it, section)) continue;
        if(!matchesTags(it, selectedTags, mode)) continue;
        res.push(it);
      }
      return res;
    }

    // ---------------------------
    // Render: Section dropdown
    // ---------------------------
    function renderSectionSelect(){
      const secs = getAllSections();
      const frag = document.createDocumentFragment();

      // Keep first option
      while($sectionSelect.options.length > 1) $sectionSelect.remove(1);

      for(const s of secs){
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = "Раздел: " + s;
        frag.appendChild(opt);
      }
      $sectionSelect.appendChild(frag);
    }

    // ---------------------------
    // Render: Tag chips with counts
    // ---------------------------
    function renderTagChips(){
      const tagCounts = getTagCounts();
      const frag = document.createDocumentFragment();

      $tagChips.innerHTML = "";
      for(const [tag, cnt] of tagCounts){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        btn.dataset.tag = tag;
        btn.dataset.on = state.selectedTags.has(tag) ? "true" : "false";
        btn.innerHTML = `<span class="label">${escapeHtml(tag)}</span><span class="count">${cnt}</span>`;
        btn.addEventListener("click", () => {
          if(state.selectedTags.has(tag)) state.selectedTags.delete(tag);
          else state.selectedTags.add(tag);
          // Update this chip only (micro-optimization) + rerender results/filter label
          btn.dataset.on = state.selectedTags.has(tag) ? "true" : "false";
          renderResults();
        });
        frag.appendChild(btn);
      }
      $tagChips.appendChild(frag);
    }

    // ---------------------------
    // Render: Results (grouped by section)
    // ---------------------------
    function renderResults(){
      const res = filteredItems();
      $count.textContent = String(res.length);

      // Active filter summary
      const parts = [];
      if(state.q.trim()) parts.push(`поиск: “${state.q.trim()}”`);
      if(state.section !== "__ALL__") parts.push(`раздел: ${state.section}`);
      if(state.selectedTags.size){
        const list = Array.from(state.selectedTags);
        parts.push(`теги (${state.mode}): ${list.join(", ")}`);
      }
      $activeFilters.textContent = parts.length ? parts.join(" • ") : "Фильтры не заданы";

      $out.innerHTML = "";
      if(res.length === 0){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Ничего не найдено. Попробуйте изменить поиск, раздел или теги.";
        $out.appendChild(empty);
        return;
      }

      const grouped = groupBy(res, it => it.section);
      const sections = Array.from(grouped.keys()).sort((a,b)=>a.localeCompare(b,'ru'));

      const rootFrag = document.createDocumentFragment();

      for(const sec of sections){
        const groupWrap = document.createElement("div");
        groupWrap.className = "group";

        const head = document.createElement("div");
        head.className = "group-title";
        head.innerHTML = `<span class="name">${escapeHtml(sec)}</span><span class="small">${grouped.get(sec).length}</span>`;
        groupWrap.appendChild(head);

        const grid = document.createElement("div");
        grid.className = "grid";

        const frag = document.createDocumentFragment();
        for(const it of grouped.get(sec)){
          frag.appendChild(renderCard(it));
        }
        grid.appendChild(frag);
        groupWrap.appendChild(grid);

        rootFrag.appendChild(groupWrap);
      }

      $out.appendChild(rootFrag);
    }

    function renderCard(it){
      const card = document.createElement("article");
      card.className = "card";
      card.tabIndex = 0;
      card.setAttribute("role","button");
      card.setAttribute("aria-label", `Открыть карточку: ${it.title}`);

      const tags = (it.tags || []).slice(0, 8);
      const tagsHtml = tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");

      card.innerHTML = `
        <div class="card-top">
          <div class="card-title">${escapeHtml(it.title)}</div>
          <span class="badge">${escapeHtml(it.section)}</span>
        </div>
        <div class="card-preview">${escapeHtml(excerpt(it.fullText, 320))}</div>
        <div class="tagline">${tagsHtml}</div>
      `;

      const open = () => openModal(it);
      card.addEventListener("click", open);
      card.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          open();
        }
      });
      return card;
    }

    // ---------------------------
    // Modal
    // ---------------------------
    function openModal(it){
      $mTitle.textContent = it.title;
      $mSection.textContent = it.section;

      // tags line
      const tags = (it.tags || []);
      $mTagsLine.textContent = tags.length ? tags.join(" ") : "";

      // images
      $mImages.innerHTML = "";
      const imgs = (it.images || []);
      if(imgs.length){
        const frag = document.createDocumentFragment();
        for(const src of imgs){
          const fig = document.createElement("figure");
          fig.className = "preview";

          const img = document.createElement("img");
          img.alt = it.title;
          img.loading = "eager";
          img.decoding = "async";
          img.src = src;

          const ph = document.createElement("div");
          ph.className = "ph";
          ph.innerHTML = `Изображение не найдено (ожидается файл)<br><span class="kbd">${escapeHtml(src)}</span>`;

          img.onerror = () => {
            fig.classList.add("broken");
          };

          fig.appendChild(img);
          fig.appendChild(ph);
          frag.appendChild(fig);
        }
        $mImages.appendChild(frag);
      }

      // full text (без изменений)
      $mText.textContent = it.fullText;

      $modal.setAttribute("aria-hidden","false");
      document.body.style.overflow = "hidden";
      // focus close
      $closeBtn.focus();
    }

    function closeModal(){
      $modal.setAttribute("aria-hidden","true");
      document.body.style.overflow = "";
      $mImages.innerHTML = "";
    }

    $closeBtn.addEventListener("click", closeModal);

    // click outside
    $modal.addEventListener("click", (e) => {
      if(e.target === $modal) closeModal();
    });

    // esc
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && $modal.getAttribute("aria-hidden") === "false"){
        closeModal();
      }
    });

    // ---------------------------
    // Events: filters
    // ---------------------------
    let qTimer = null;
    $q.addEventListener("input", () => {
      // small debounce for large arrays
      clearTimeout(qTimer);
      qTimer = setTimeout(() => {
        state.q = $q.value || "";
        renderResults();
      }, 80);
    });

    $sectionSelect.addEventListener("change", () => {
      state.section = $sectionSelect.value;
      renderResults();
    });

    function setMode(mode){
      state.mode = mode;
      $modeAnd.setAttribute("aria-pressed", mode === "AND" ? "true" : "false");
      $modeOr.setAttribute("aria-pressed", mode === "OR" ? "true" : "false");
      renderResults();
    }
    $modeAnd.addEventListener("click", () => setMode("AND"));
    $modeOr.addEventListener("click", () => setMode("OR"));

    $clearBtn.addEventListener("click", () => {
      state.q = "";
      state.section = "__ALL__";
      state.selectedTags.clear();
      state.mode = "AND";

      $q.value = "";
      $sectionSelect.value = "__ALL__";
      $modeAnd.setAttribute("aria-pressed","true");
      $modeOr.setAttribute("aria-pressed","false");

      // rerender chips (to reset on/off) + results
      renderTagChips();
      renderResults();
    });

    // ---------------------------
    // Init
    // ---------------------------
    renderSectionSelect();
    renderTagChips();
    renderResults();
  </script>
</body>
</html>
